<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Penny</title>
  <link rel="icon" href="../icons/icon-48.png">
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="page.css">
  <script type="module" src="../dist/page/page.js"></script>
</head>
<body>
<div id="app">
  <div id="header">
    <h1><img src="../penny.svg" alt="Penny" id="header-icon"> Penny</h1>
    <div id="tabs">
      <button class="tab active" data-tab="prompts"><i class="fa-solid fa-scroll"></i> Prompts</button>
      <button class="tab" data-tab="memories"><i class="fa-solid fa-database"></i> Memories</button>
      <button class="tab" data-tab="schedules"><i class="fa-solid fa-clock"></i> Schedules</button>
      <button class="tab" data-tab="domains"><i class="fa-solid fa-globe"></i> Domains</button>
      <button class="tab" data-tab="config"><i class="fa-solid fa-sliders"></i> Config</button>
    </div>
  </div>

  <!-- Prompts panel -->
  <div id="panel-prompts" class="panel">
    <div id="agent-tabs">
      <button class="sub-tab active" data-agent=""><i class="fa-solid fa-layer-group"></i> All</button>
      <button class="sub-tab" data-agent="collector"><i class="fa-solid fa-database"></i> Collector</button>
      <button class="sub-tab" data-agent="chat"><i class="fa-solid fa-comment"></i> Chat</button>
      <button class="sub-tab" data-agent="history"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
      <button class="sub-tab flagged-toggle" id="prompts-flagged-toggle" title="Show only runs flagged with a health issue (bail / incomplete / tool failure / half-formed send)"><i class="fa-solid fa-triangle-exclamation"></i> Flagged only</button>
    </div>
    <div class="search-row">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="search" id="prompts-search" placeholder="Search prompt text…">
      <button type="button" class="search-clear" id="prompts-search-clear" aria-label="Clear search"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="prompts-loading" class="panel-loading">Loading prompt logs...</div>
    <div id="runs"></div>
    <div id="prompts-load-more" class="hidden">
      <button id="prompts-load-more-btn" class="load-more-btn"><i class="fa-solid fa-chevron-down"></i> Load more</button>
    </div>
  </div>

  <!-- Memories panel -->
  <div id="panel-memories" class="panel hidden">
    <div id="memory-tabs">
      <button class="sub-tab active" data-mtab="collections"><i class="fa-solid fa-database"></i> Collections</button>
      <button class="sub-tab" data-mtab="logs"><i class="fa-solid fa-list"></i> Logs</button>
      <button class="sub-tab" data-mtab="archived"><i class="fa-solid fa-box-archive"></i> Archived</button>
    </div>
    <div class="search-row">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="search" id="memories-search" placeholder="Search name, intent, or entries…">
      <button type="button" class="search-clear" id="memories-search-clear" aria-label="Clear search"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="memories-loading" class="panel-loading">Loading memories...</div>
    <div id="memories-list"></div>
    <div id="memory-detail" class="hidden">
      <button id="memory-detail-back" class="memory-back-btn"><i class="fa-solid fa-chevron-left"></i> Back</button>
      <div id="memory-detail-content"></div>
    </div>
  </div>

  <!-- Schedules panel -->
  <div id="panel-schedules" class="panel hidden">
    <div class="schedules-add">
      <input type="text" id="schedules-input" placeholder="daily 9am check the news">
      <button id="schedules-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="schedules-list" id="schedules-list"></div>
  </div>

  <!-- Domains panel -->
  <div id="panel-domains" class="panel hidden">
    <div class="domains-add">
      <input type="text" id="domains-input" placeholder="example.com">
      <select id="domains-permission">
        <option value="allowed">Allow</option>
        <option value="blocked">Block</option>
      </select>
      <button id="domains-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="domains-list" id="domains-list"></div>
  </div>

  <!-- Config panel -->
  <div id="panel-config" class="panel hidden">
    <div id="tool-use-row" class="config-toggle-row">
      <label for="tool-use-toggle"><i class="fa-solid fa-wrench"></i> Allow tool use</label>
      <input type="checkbox" id="tool-use-toggle">
    </div>
    <div id="config-list"></div>
  </div>
</div>
<div id="toast"></div>
</body>
</html>
